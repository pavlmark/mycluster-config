name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.set_sha.outputs.short_sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Short SHA
        id : set_sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESSTOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./kubernetes/fluxcd/repositories/example-app-1/src/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/example-app-1:${{ steps.set_sha.outputs.short_sha }}
  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infrastructure Repo
        uses: actions/checkout@v6
        with:
          repository: pavlmark/mycluster-config
          token: ${{ secrets.GITOPS_TOKEN }}
          path: mycluster-config

      - name: Update Image Tag in Kubernetes Deployment
        uses: mikefarah/yq@v4
        with:
          # Using the short SHA passed from the previous job 
          cmd:  yq -i '.spec.template.spec.containers[0].image = "pavlmark/example-app-1:${{ needs.build-and-push.outputs.short_sha }}"' mycluster-config/kubernetes/fluxcd/repositories/example-app-1/deploy/deployment.yaml   
      - name: Commit and Push to Mycluster-config Repo
        run: |
          cd mycluster-config
          git config user.email="pavels.markovskis@gmail.com"
          git config user.name="pavlmark"
          git add .
          git commit -m "Deploying image tag ${{ needs.build-and-push.outputs.short_sha }}"
          git push
