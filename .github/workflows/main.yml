name: CI GitOps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: pavlmark/example-app-1
  GITOPS_REPO: pavlmark/cluster-config
  GITOPS_PATH: apps/example-app/deployment.yaml

jobs:
  build-and-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESSTOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.IMAGE }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: cluster-config

      - name: Update image tag in GitOps repo
        run: |
          cd cluster-config

          sed -i "s|image: pavlmark/example-app-1:.*|image: ${{ steps.vars.outputs.IMAGE }}|g" "${{ env.GITOPS_PATH }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "${{ env.GITOPS_PATH }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update example-app image to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
