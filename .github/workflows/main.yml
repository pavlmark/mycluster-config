name: CI GitOps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: pavlmark/example-app-1
  GITOPS_REPO: pavlmark/mycluster-config
  DEPLOYMENT_FILE: mycluster-config/kubernetes/fluxcd/repositories/example-app-1/deploy/deployment.yaml

jobs:
  build-and-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          IMAGE_TAG="0.0.${{ github.run_number }}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE_NAME}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESSTOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./kubernetes/fluxcd/repositories/example-app-1/src
          file: ./kubernetes/fluxcd/repositories/example-app-1/src/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.IMAGE }}

      - name: Checkout mycluster-config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: mycluster-config

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: pavlmark/example-app-1:.*|image: ${{ steps.vars.outputs.IMAGE }}|g" "${{ env.DEPLOYMENT_FILE }}"

          git config user.name "pavlmark"
          git config user.email "pm@gmail.com"

          git add "${{ env.DEPLOYMENT_FILE }}"
          git commit -m "Update example-app image to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
