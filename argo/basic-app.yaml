apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-app-argo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pavlmark/mycluster-config.git
    targetRevision: HEAD
    path: kubernetes/fluxcd/repositories/example-app-1/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
