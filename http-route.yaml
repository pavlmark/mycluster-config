apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-2-httproute-argocd
  namespace: argocd
spec:
  parentRefs:
    - name: gateway-api
      namespace: default
      sectionName: https
  hostnames:
    - "argocd.pavlmark-it.com"
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
