apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-1-httproute
spec:
  parentRefs:
  - name: gateway-api
    sectionName: https
    kind: Gateway

  hostnames:
  - "pavlmark-it.com"
  
  rules:
  - backendRefs:
    - name: example-app-svc
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-app-2-httproute-grafana
  namespace: monitoring

spec:
  parentRefs:
  - name: gateway-api
    namespace: default
    sectionName: https
    kind: Gateway

  hostnames:
  - "grafana.pavlmark-it.com"

  rules:
  - backendRefs:
    - name: prometheus-grafana
      port: 80
